title: HelmLiteracy
description: Financial & AI literacy tips, tools, and guides to help you navigate money and technology with confidence.
url: "https://mylasoliz.github.io"
baseurl: "/HelmLiteracy"

author:
  name: HelmLiteracy

# Subscribe form — paste your Formspree endpoint here after signing up at formspree.io
formspree_endpoint: "https://formspree.io/f/xpqvppnn"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 6
paginate_path: "/page:num/"

permalink: /:year/:month/:day/:title/

# Navigation
header_pages:
  - about.md
  - categories.md

# Collections
collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
